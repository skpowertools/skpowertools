<!-- welding icon for SK Power Tools -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Welding torch body (angled grip) -->
  <rect x="14" y="72" width="50" height="18" rx="5" fill="#0d2240" transform="rotate(-35 39 81)"/>
  <!-- Torch neck -->
  <rect x="52" y="44" width="14" height="36" rx="4" fill="#0d2240" transform="rotate(-35 59 62)"/>
  <!-- Torch tip nozzle -->
  <rect x="72" y="22" width="12" height="22" rx="3" fill="#0d2240" transform="rotate(-35 78 33)"/>
  <!-- Arc spark burst at tip -->
  <!-- Central bright dot -->
  <circle cx="89" cy="22" r="5" fill="#f9c000"/>
  <!-- Spark rays -->
  <line x1="89" y1="22" x2="89" y2="8" stroke="#f9c000" stroke-width="3" stroke-linecap="round"/>
  <line x1="89" y1="22" x2="103" y2="12" stroke="#f9c000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="89" y1="22" x2="108" y2="24" stroke="#f9c000" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="22" x2="103" y2="35" stroke="#f9c000" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="22" x2="74" y2="10" stroke="#f9c000" stroke-width="2" stroke-linecap="round"/>
  <!-- Small spark dots -->
  <circle cx="99" cy="9" r="2.5" fill="#f9c000"/>
  <circle cx="110" cy="18" r="2" fill="#f9c000"/>
  <circle cx="106" cy="36" r="2" fill="#f9c000"/>
  <!-- Weld bead / work surface -->
  <rect x="18" y="100" width="92" height="10" rx="3" fill="#0d2240"/>
  <ellipse cx="38" cy="100" rx="7" ry="4" fill="#f9c000"/>
  <ellipse cx="56" cy="100" rx="7" ry="4" fill="#f9c000"/>
  <ellipse cx="74" cy="100" rx="7" ry="4" fill="#f9c000"/>
</svg>