<!-- lifting-equipment icon for SK Power Tools -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pulley wheel at top -->
  <circle cx="64" cy="22" r="16" fill="#0d2240"/>
  <circle cx="64" cy="22" r="8" fill="#f8f5ee"/>
  <circle cx="64" cy="22" r="4" fill="#0d2240"/>
  <!-- Pulley housing bracket -->
  <rect x="56" y="6" width="16" height="10" rx="3" fill="#0d2240"/>
  <!-- Mounting anchor point -->
  <rect x="60" y="2" width="8" height="6" rx="2" fill="#0d2240"/>
  <!-- Chain left side -->
  <rect x="52" y="38" width="8" height="6" rx="2" fill="#0d2240"/>
  <rect x="52" y="48" width="8" height="6" rx="2" fill="#0d2240"/>
  <rect x="52" y="58" width="8" height="6" rx="2" fill="#0d2240"/>
  <rect x="52" y="68" width="8" height="6" rx="2" fill="#0d2240"/>
  <!-- Chain link connectors left -->
  <rect x="54" y="44" width="4" height="5" rx="1" fill="#f8f5ee" opacity="0.3"/>
  <rect x="54" y="54" width="4" height="5" rx="1" fill="#f8f5ee" opacity="0.3"/>
  <rect x="54" y="64" width="4" height="5" rx="1" fill="#f8f5ee" opacity="0.3"/>
  <!-- Large load hook -->
  <path d="M56 74 Q56 90 64 90 Q80 90 80 76 Q80 66 70 66 Q60 66 60 74" fill="none" stroke="#0d2240" stroke-width="10" stroke-linecap="round"/>
  <!-- Hook tip point -->
  <circle cx="56" cy="74" r="5" fill="#0d2240"/>
  <!-- Hook safety latch -->
  <path d="M60 90 Q56 96 58 100" fill="none" stroke="#0d2240" stroke-width="6" stroke-linecap="round"/>
  <!-- Hook accent ring -->
  <circle cx="64" cy="80" r="4" fill="#f9c000"/>
  <!-- Load weight block -->
  <rect x="36" y="104" width="56" height="18" rx="5" fill="#0d2240"/>
  <!-- Weight ribs -->
  <rect x="46" y="108" width="4" height="10" rx="1" fill="#f8f5ee" opacity="0.2"/>
  <rect x="58" y="108" width="4" height="10" rx="1" fill="#f8f5ee" opacity="0.2"/>
  <rect x="70" y="108" width="4" height="10" rx="1" fill="#f8f5ee" opacity="0.2"/>
  <!-- Chain connecting hook to weight -->
  <rect x="60" y="100" width="8" height="5" rx="1" fill="#0d2240"/>
  <!-- Yellow chain accent on hook outer ring -->
  <circle cx="64" cy="22" r="11" fill="none" stroke="#f9c000" stroke-width="2.5" stroke-dasharray="6 4"/>
</svg>