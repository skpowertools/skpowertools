<!-- cleaning-equipment icon for SK Power Tools -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Pressure washer gun body - angled grip -->
  <rect x="22" y="56" width="48" height="18" rx="6" fill="#0d2240" transform="rotate(-30 46 65)"/>
  <!-- Trigger -->
  <rect x="40" y="62" width="8" height="14" rx="4" fill="#0d2240" transform="rotate(-30 44 69)"/>
  <!-- Wand / lance - long tube pointing right -->
  <rect x="56" y="40" width="52" height="10" rx="5" fill="#0d2240" transform="rotate(-10 82 45)"/>
  <!-- Nozzle tip -->
  <polygon points="106,37 116,40 106,43" fill="#0d2240" transform="rotate(-10 111 40)"/>
  <!-- Water jet spray fan -->
  <line x1="112" y1="36" x2="128" y2="20" stroke="#f9c000" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="38" x2="128" y2="30" stroke="#f9c000" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="40" x2="128" y2="40" stroke="#f9c000" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="42" x2="128" y2="50" stroke="#f9c000" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="44" x2="128" y2="60" stroke="#f9c000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Spray droplets -->
  <circle cx="122" cy="18" r="2.5" fill="#f9c000"/>
  <circle cx="126" cy="34" r="2" fill="#f9c000"/>
  <circle cx="124" cy="52" r="2.5" fill="#f9c000"/>
  <!-- Hose coil behind grip -->
  <path d="M28 70 Q16 70 14 80 Q12 90 20 92 Q28 94 30 86" fill="none" stroke="#0d2240" stroke-width="7" stroke-linecap="round"/>
  <!-- Hose inlet connector -->
  <circle cx="30" cy="86" r="5" fill="#0d2240"/>
  <!-- Surface being cleaned -->
  <rect x="8" y="100" width="112" height="12" rx="4" fill="#0d2240"/>
  <!-- Clean surface shimmer -->
  <rect x="20" y="103" width="20" height="6" rx="2" fill="#f8f5ee" opacity="0.25"/>
  <rect x="52" y="103" width="14" height="6" rx="2" fill="#f8f5ee" opacity="0.25"/>
  <rect x="78" y="103" width="22" height="6" rx="2" fill="#f8f5ee" opacity="0.25"/>
</svg>